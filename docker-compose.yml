services:
  deployer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deployer
    restart: unless-stopped
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      DEPLOY_BASE_PATH: /repos
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./repos:/repos
      - ${HOME}/.ssh:/root/.ssh:ro
